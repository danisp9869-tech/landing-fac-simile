name: Deploy landing su GitHub Pages

# Pubblica il sito ogni volta che si aggiorna il branch main.
on:
  push:
    branches: [main]
  workflow_dispatch:   # permette anche l'avvio manuale dalla tab "Actions"

# Permessi necessari per pubblicare su Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploy sovrapposti
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4

      - name: Configura Pages (lo attiva se non lo e' gia')
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Carica i file del sito
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # index.html sta nella cartella principale

      - name: Pubblica su Pages
        id: deployment
        uses: actions/deploy-pages@v4
