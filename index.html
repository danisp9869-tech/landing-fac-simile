<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prenota il tuo tavolo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&family=League+Spartan:wght@700;800&display=swap" rel="stylesheet">

<!-- ═══════════════════════════════════════════════════════════════════════
     FOOD MEDIA LAB · TEMPLATE LANDING PRENOTAZIONI RISTORANTE
     ───────────────────────────────────────────────────────────────────────
     File singolo, autonomo, zero build. Apribile con doppio click.
     Per ogni nuovo cliente si modifica SOLO l'oggetto CONFIG qui sotto.
     Istruzioni complete: vedi il README in fondo alla pagina / repo.
     ═══════════════════════════════════════════════════════════════════════ -->

<script>
/* ╔═══════════════════════════════════════════════════════════════════════╗
   ║  ⚙️  BLOCCO DI CONFIGURAZIONE — l'UNICA parte da modificare per cliente ║
   ╚═══════════════════════════════════════════════════════════════════════╝
   Tutto il resto della pagina legge da qui: non toccare il codice sotto.   */
const CONFIG = {

  /* ─── 1. BRAND / IDENTITÀ ───────────────────────────────────────────── */
  brand: {
    nome:     "Trattoria del Borgo",  // nome del ristorante
    tagline:  "Ristorante · Torino",  // piccola scritta sopra il titolo
    logo:     "",                     // path immagine logo (es. "logo.png"); se "" usa le iniziali
    iniziali: "TB",                   // fallback mostrato nel cerchio se manca il logo
  },

  /* ─── 2. COLORI BRAND (default nero / bianco / oro Food Media Lab) ───── */
  colori: {
    oro:        "#b8933a",  // colore accento principale
    oroChiaro:  "#e8d5a3",
    oroPale:    "#fdf6e3",
    nero:       "#1a1612",  // testo e sfondi scuri
    inkLight:   "#4a4540",
    crema:      "#faf8f4",  // sfondo pagina
    bianco:     "#ffffff",
    ctaBg:      "#b8933a",  // sfondo del bottone CTA (default oro)
    ctaText:    "#1a1612",  // testo del bottone CTA (default nero)
  },

  /* ─── 3. HERO (headline + sottotitolo, unica sezione di testo) ───────── */
  hero: {
    // Usa <em> per evidenziare una parola in oro corsivo
    headline:    "Scopri il gusto<br><em>della tradizione</em>",
    sottotitolo: "Cucina italiana di qualità nel cuore della città — prenota il tuo tavolo e vivi un'esperienza indimenticabile.",
    ctaTesto:    "Prenota il tuo tavolo",
  },

  /* ─── 4. CONTATTI / FOOTER ──────────────────────────────────────────── */
  contatti: {
    indirizzo: "Via Roma 12, 10123 Torino",
    telefono:  "+39 011 000 0000",
    email:     "info@trattoriadelborgo.it",
    linkMappe: "https://maps.google.com/?q=Via+Roma+12+Torino",
    social: {
      instagram: "https://instagram.com/",   // "" per nascondere
      facebook:  "https://facebook.com/",     // "" per nascondere
    },
    // Orari mostrati nel footer (testo libero, aggiungi/rimuovi righe a piacere)
    orari: [
      { giorno: "Martedì – Venerdì", orario: "19:00 – 23:30" },
      { giorno: "Sabato – Domenica", orario: "12:30 – 15:00 · 19:00 – 23:30" },
      { giorno: "Lunedì",            orario: "Chiuso" },
    ],
  },

  /* ─── 5. PRENOTAZIONI — LOGICA DISPONIBILITÀ ★ CUORE DEL TEMPLATE ★ ──── */
  prenotazioni: {
    capienzaCoperti: 50,   // ← coperti totali disponibili per OGNI fascia oraria

    // Fasce orarie selezionabili dall'utente
    fasceOrarie: ["19:00", "19:30", "20:00", "20:30", "21:00", "21:30", "22:00"],

    // Giorni di chiusura settimanale (0=Domenica, 1=Lunedì … 6=Sabato)
    giorniChiusura: [1],   // es. [1] = chiuso il lunedì; [] = sempre aperto

    maxPersonePrenotazione: 20,  // limite persone per singola prenotazione
    sogliaUltimiPosti:      8,   // sotto N coperti liberi mostra "Ultimi posti"
    giorniPrenotabili:      60,  // finestra prenotabile in giorni a partire da oggi

    // COPERTI GIÀ OCCUPATI DI ESEMPIO (solo per la DEMO del template).
    // Chiave = data "YYYY-MM-DD" → { "HH:MM": coperti_gia_prenotati }
    // Servono a farti vedere subito il "grigetto" delle fasce piene funzionare.
    // ⚠️ In produzione questi valori arrivano dallo Sheet / DB, non da qui.
    occupatiDemo: {
      // (le date vengono "riancorate" a partire da oggi all'avvio — vedi ancoraDemo)
      "GIORNO+1": { "21:00": 50, "20:30": 47 },  // 21:00 pieno · 20:30 quasi pieno
      "GIORNO+2": { "20:00": 50, "21:30": 45 },  // 20:00 pieno
    },
    // Se true, "GIORNO+N" nell'occupatiDemo viene convertito in date reali
    // (oggi + N giorni) così la demo mostra sempre fasce piene nei prossimi giorni.
    ancoraDemo: true,
  },

  /* ─── 6. INTEGRAZIONE GOOGLE SHEETS (una diversa per ogni ristorante) ── */
  integrazione: {
    // URL della Web App di Google Apps Script collegata allo Sheet del cliente.
    // Ogni landing → uno Sheet diverso → basta incollare qui l'URL giusto.
    // Lascialo "" per lavorare solo in locale (demo).
    // 👉 Come crearlo: vedi il README (sezione "Collegare Google Sheets").
    googleSheetsWebAppUrl: "",

    // Se true, all'apertura la pagina prova a leggere i coperti occupati reali
    // dallo Sheet (richiede la Web App configurata per rispondere ai GET).
    leggiOccupatiDaSheets: false,
  },

  /* ─── 7. TESTI FISSI (di norma non serve toccarli) ──────────────────── */
  testi: {
    formTitolo:     "Prenota il tuo tavolo",
    stepData:       "Data",
    stepPersone:    "Persone",
    stepOrario:     "Orario",
    labelNome:      "Nome e cognome",
    labelTelefono:  "Numero di telefono",
    labelRichieste: "Richieste speciali",
    btnConferma:    "Conferma prenotazione",
    successTitolo:  "Prenotazione confermata!",
    successMsg:     "Grazie per aver scelto di cenare con noi. Ti aspettiamo!",
  },
};
</script>

<style>
:root{
  /* Questi valori vengono sovrascritti da CONFIG.colori all'avvio (applicaColori) */
  --cream:#faf8f4;
  --warm-white:#ffffff;
  --ink:#1a1612;
  --ink-light:#4a4540;
  --gold:#b8933a;
  --gold-light:#e8d5a3;
  --gold-pale:#fdf6e3;
  --cta-bg:#b8933a;
  --cta-text:#1a1612;
  --gray-100:#f4f2ee;
  --gray-200:#e8e4de;
  --gray-300:#ccc8c0;
  --gray-400:#a09890;
  --gray-500:#706860;
  --shadow-sm:0 1px 4px rgba(26,22,18,.06);
  --shadow-md:0 4px 20px rgba(26,22,18,.10);
  --shadow-lg:0 12px 48px rgba(26,22,18,.14);
  --radius-sm:8px;
  --radius-md:16px;
  --radius-lg:24px;
  --font-display:'Playfair Display',Georgia,serif;
  --font-body:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:hidden;-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{
  font-family:var(--font-body);
  background:var(--cream);
  color:var(--ink);
  overflow-x:hidden;
  width:100%;
  max-width:100vw;
  min-height:100vh;
}

/* ── Texture di sfondo ── */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(184,147,58,.06) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 100% 100%, rgba(184,147,58,.04) 0%, transparent 60%);
  pointer-events:none;
  z-index:0;
}

/* ── Layout base ── */
.wrapper{
  position:relative;
  z-index:1;
  max-width:640px;
  width:100%;
  margin:auto;
  padding:40px 24px 40px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* ── HERO ── */
.brand-header{text-align:center;width:100%;margin-bottom:36px}
.logo-wrap{
  width:100px;height:100px;border-radius:50%;
  background:var(--warm-white);
  margin:0 auto 24px;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  box-shadow:0 0 0 1px rgba(184,147,58,.2), var(--shadow-md);
}
.logo-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.logo-initials{
  font-family:var(--font-display);
  font-size:34px;font-weight:700;color:var(--gold);letter-spacing:1px;
}
.brand-eyebrow{
  font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;
  color:var(--gold);margin-bottom:14px;
}
h1{
  font-family:var(--font-display);
  font-size:clamp(30px,8vw,46px);font-weight:700;line-height:1.08;
  color:var(--ink);margin-bottom:16px;letter-spacing:-.5px;
}
h1 em{font-style:italic;color:var(--gold)}
.subtitle{
  font-size:clamp(14px,3.5vw,16px);color:var(--ink-light);line-height:1.65;
  max-width:480px;margin:0 auto 28px;font-weight:400;
}

/* ── CTA hero ── */
.hero-cta{
  display:inline-flex;align-items:center;gap:10px;
  margin-top:28px;
  padding:16px 30px;border:none;border-radius:100px;
  background:var(--cta-bg);color:var(--cta-text);
  font-family:var(--font-body);font-size:15px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;cursor:pointer;
  box-shadow:var(--shadow-md);
  transition:transform .12s, box-shadow .2s, filter .2s;
}
.hero-cta:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);filter:brightness(1.03)}
.hero-cta:active{transform:translateY(0)}
.hero-cta:focus-visible{outline:3px solid var(--gold-light);outline-offset:3px}
.hero-cta svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}

/* ── Booking widget ── */
.booking-card{
  width:100%;background:var(--warm-white);border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);overflow:hidden;
  border:1px solid rgba(184,147,58,.12);
  scroll-margin-top:20px;
}
.booking-header{
  display:flex;align-items:center;justify-content:center;position:relative;
  padding:18px 20px;background:var(--warm-white);border-bottom:1px solid var(--gray-200);
}
.booking-back{
  position:absolute;left:16px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;padding:6px;color:var(--gold);
  display:flex;align-items:center;justify-content:center;border-radius:8px;transition:background .15s;
}
.booking-back:hover{background:var(--gold-pale)}
.booking-back:focus-visible{outline:2px solid var(--gold);outline-offset:1px}
.booking-back svg{width:20px;height:20px;stroke:var(--gold);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.booking-back.hidden{visibility:hidden;pointer-events:none}
.booking-header-inner{display:flex;flex-direction:column;align-items:center;gap:2px}
.booking-brand{
  font-family:'League Spartan',sans-serif;font-size:11px;font-weight:800;
  letter-spacing:3px;text-transform:uppercase;color:var(--gold);line-height:1;
}
.booking-title{font-size:16px;font-weight:600;color:var(--ink);letter-spacing:.2px}
.booking-progress{width:80px;height:3px;background:var(--gray-200);border-radius:999px;display:none;overflow:hidden}
.booking-progress-fill{height:100%;background:var(--gold);border-radius:999px;width:0%;transition:width .3s ease}
.booking-wizard.summary-mode .booking-header-inner{display:none}
.booking-wizard.summary-mode .booking-progress{display:block}

/* ── Wizard frame ── */
.wizard-frame{background:var(--gray-100);padding:16px;min-height:460px;display:flex;flex-direction:column}
.wizard-toolbar{margin-bottom:14px;min-height:72px;flex-shrink:0}
.wizard-content{flex:1;min-height:340px;display:flex;flex-direction:column}
.wizard-content .step-panel.active{animation:fadeIn .22s ease;width:100%}
.booking-wizard.success-mode .wizard-toolbar{display:none;margin:0;min-height:0}
.booking-wizard.success-mode .wizard-content{min-height:0;justify-content:flex-start}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── Step tabs ── */
.step-tabs{display:flex;gap:8px}
.step-tab{
  flex:1;background:var(--warm-white);border-radius:var(--radius-sm);padding:12px 8px;
  text-align:center;border:1px solid transparent;transition:border-color .2s,box-shadow .2s;
  cursor:default;min-width:0;
}
.step-tab.active{border-color:var(--gold-light);box-shadow:0 0 0 2px rgba(184,147,58,.08), var(--shadow-sm)}
.step-tab.done{cursor:pointer}
.step-tab.done:hover{border-color:var(--gray-300)}
.step-tab-icon{display:flex;justify-content:center;margin-bottom:5px;color:var(--gray-400)}
.step-tab.active .step-tab-icon,.step-tab.done .step-tab-icon{color:var(--gold)}
.step-tab-label{font-size:10px;color:var(--gray-400);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.3px;text-transform:uppercase;font-weight:500}
.step-tab.active .step-tab-label,.step-tab.done .step-tab-label{color:var(--ink-light);font-weight:600}
.step-tab-value{font-size:12px;color:var(--ink);font-weight:600;margin-top:2px}

/* ── Summary bar ── */
.summary-bar{display:none;background:var(--warm-white);border-radius:var(--radius-sm);box-shadow:var(--shadow-sm);overflow:hidden;border:1px solid var(--gray-200)}
.summary-bar.visible{display:flex}
.summary-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 8px;gap:5px;position:relative}
.summary-item:not(:last-child)::after{content:'';position:absolute;right:0;top:20%;height:60%;width:1px;background:var(--gray-200)}
.summary-item svg{width:18px;height:18px;stroke:var(--gold);fill:none;stroke-width:1.8}
.summary-item span{font-size:12px;font-weight:600;color:var(--ink)}
.summary-item.pending svg{stroke:var(--gray-300)}
.summary-item.pending span{color:var(--gray-400)}

/* ── Cards ── */
.wizard-card{background:var(--warm-white);border-radius:var(--radius-md);padding:20px;box-shadow:var(--shadow-sm);border:1px solid var(--gray-200)}

/* ── Calendar ── */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.cal-month{font-family:var(--font-display);font-size:17px;font-weight:600;color:var(--ink)}
.cal-nav{display:flex;gap:8px}
.cal-nav button{background:var(--gray-100);border:1px solid var(--gray-200);cursor:pointer;padding:6px;color:var(--gold);display:flex;align-items:center;border-radius:8px;transition:background .15s}
.cal-nav button:hover:not(:disabled){background:var(--gold-pale)}
.cal-nav button:disabled{opacity:.35;cursor:not-allowed}
.cal-nav button:focus-visible{outline:2px solid var(--gold);outline-offset:1px}
.cal-nav svg{width:16px;height:16px;stroke:var(--gold);fill:none;stroke-width:2.5;stroke-linecap:round}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:10px}
.cal-weekdays span{font-size:10px;font-weight:700;color:var(--gray-400);letter-spacing:1px;text-transform:uppercase}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center}
.cal-day{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:14px;
  border-radius:8px;cursor:pointer;border:none;background:none;font-family:var(--font-body);
  color:var(--ink);transition:background .12s,color .12s;font-weight:400;
}
.cal-day:hover:not(.disabled):not(.empty){background:var(--gold-pale);color:var(--gold)}
.cal-day:focus-visible{outline:2px solid var(--gold);outline-offset:1px}
.cal-day.disabled{color:var(--gray-300);cursor:not-allowed}
.cal-day.closed{color:var(--gray-300);cursor:not-allowed;text-decoration:line-through;text-decoration-color:var(--gray-300)}
.cal-day.empty{cursor:default}
.cal-day.selected{background:var(--gold);color:var(--warm-white);font-weight:600}
.cal-day.today:not(.selected){font-weight:700;color:var(--gold);background:var(--gold-pale)}

/* ── People grid ── */
.people-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px}
.people-btn{
  padding:12px 6px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);
  background:var(--warm-white);color:var(--ink);font-size:15px;font-weight:500;cursor:pointer;
  font-family:var(--font-body);transition:all .15s;
}
.people-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-pale)}
.people-btn:focus-visible{outline:2px solid var(--gold);outline-offset:1px}
.people-btn.selected{background:var(--gold);color:var(--warm-white);border-color:var(--gold);font-weight:600}
.people-custom label{display:block;font-size:13px;font-weight:600;margin-bottom:8px;color:var(--ink-light);text-transform:uppercase;letter-spacing:.5px}
.people-custom-row{display:flex;gap:8px;align-items:stretch}
.people-custom-row input{
  flex:1;padding:12px 14px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);
  font-size:15px;font-family:var(--font-body);outline:none;background:var(--warm-white);color:var(--ink);transition:border-color .15s;
}
.people-custom-row input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,147,58,.08)}
.people-custom-row input::placeholder{color:var(--gray-400)}
.people-submit{
  width:44px;min-width:44px;border:1px solid var(--gold);border-radius:var(--radius-sm);
  background:var(--gold-pale);color:var(--gold);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;transition:all .15s;
}
.people-submit:hover{background:var(--gold);color:var(--warm-white)}
.people-submit:focus-visible{outline:2px solid var(--gold);outline-offset:1px}
.people-submit svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round}

/* ── Time grid ── */
.time-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.time-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:12px 6px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);
  background:var(--warm-white);color:var(--ink);font-size:15px;font-weight:600;cursor:pointer;
  font-family:var(--font-body);transition:all .15s;letter-spacing:.3px;
}
.time-btn:hover:not(.full){border-color:var(--gold);color:var(--gold);background:var(--gold-pale)}
.time-btn:focus-visible{outline:2px solid var(--gold);outline-offset:1px}
.time-btn.selected{background:var(--gold);color:var(--warm-white);border-color:var(--gold)}
.time-btn.selected .time-status{color:rgba(255,255,255,.85)}
/* Fascia piena / non sufficiente → grigia e NON cliccabile */
.time-btn.full{
  background:var(--gray-100);color:var(--gray-400);border-color:var(--gray-200);
  cursor:not-allowed;opacity:.85;
}
.time-status{font-size:9.5px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;line-height:1}
.time-status.last{color:var(--gold)}
.time-status.full{color:var(--gray-400)}

/* ── Step 4 form ── */
.summary-form{padding-top:4px}
.form-field{margin-bottom:20px}
.form-field label{display:block;font-size:11px;font-weight:700;color:var(--ink-light);margin-bottom:8px;text-transform:uppercase;letter-spacing:.8px}
.form-field input,.form-field textarea{
  width:100%;border:none;border-bottom:1.5px solid var(--gray-200);padding:8px 0;
  font-size:16px;font-family:var(--font-body);outline:none;background:transparent;color:var(--ink);transition:border-color .15s;
}
.form-field input:focus,.form-field textarea:focus{border-bottom-color:var(--gold)}
.form-field textarea{resize:none;min-height:56px}
.field-error{display:block;font-size:11px;color:var(--rust,#c0392b);margin-top:6px;font-weight:500;min-height:0}
.btn-conferma{
  width:100%;padding:16px;border:none;border-radius:var(--radius-sm);
  background:var(--gray-200);color:var(--gray-400);font-size:15px;font-weight:700;cursor:not-allowed;
  font-family:var(--font-body);margin-top:12px;transition:background .25s,color .25s,transform .1s,box-shadow .2s;
  letter-spacing:.5px;text-transform:uppercase;
}
.btn-conferma:disabled{background:var(--gray-200)!important;color:var(--gray-400)!important;cursor:not-allowed!important}
.btn-conferma.ready:not(:disabled){background:var(--cta-bg);color:var(--cta-text);cursor:pointer;box-shadow:var(--shadow-md)}
.btn-conferma.ready:not(:disabled):hover{filter:brightness(1.04);box-shadow:var(--shadow-lg)}
.btn-conferma.ready:not(:disabled):active{transform:scale(.99)}
.btn-conferma.sending{opacity:.7;cursor:wait!important}

/* ── Success ── */
.success-screen{text-align:center;padding:28px 20px 32px;background:var(--warm-white);border-radius:var(--radius-md);border:1px solid var(--gray-200);width:100%}
.success-icon{
  width:72px;height:72px;border-radius:50%;
  background:linear-gradient(135deg,rgba(184,147,58,.12),rgba(184,147,58,.06));
  border:1.5px solid rgba(184,147,58,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;

<script>
/* ╔═══════════════════════════════════════════════════════════════════════╗
   ║  MOTORE DELLA LANDING — non serve modificarlo per customizzare.        ║
   ║  Tutto legge da CONFIG. Le funzioni di disponibilità sono isolate e    ║
   ║  documentate (getPostiOccupati / getDisponibilita / isFasciaDisponibile).║
   ╚═══════════════════════════════════════════════════════════════════════╝ */
(function(){
  'use strict';

  const C = CONFIG;
  const P = C.prenotazioni;
  const MONTHS_IT = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
  const LS_KEY = 'fml_bookings_' + slug(C.brand.nome);  // chiave localStorage per-ristorante

  /* Cache in memoria dei coperti occupati per data+ora.
     Struttura: { "YYYY-MM-DD": { "HH:MM": copertiOccupati } }
     Popolata da: (1) occupatiDemo di CONFIG, (2) localStorage, (3) [opzionale] Sheets. */
  let occupatiCache = {};

  const state = {
    step: 1,
    date: null,
    people: null,
    time: null,
    calYear: new Date().getFullYear(),
    calMonth: new Date().getMonth(),
    sending: false,
  };

  /* ─────────────────────────────────────────────────────────────────────
     UTILITY DATE
     ───────────────────────────────────────────────────────────────────── */
  function startOfDay(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
  function isSameDay(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
  function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
  function slug(s){ return String(s).toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,''); }

  // Chiave canonica "YYYY-MM-DD" (usata come identificativo giorno ovunque)
  function keyData(d){
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    return d.getFullYear() + '-' + mm + '-' + dd;
  }
  function formatData(d){
    const days = ['dom','lun','mar','mer','gio','ven','sab'];
    const dd = String(d.getDate()).padStart(2,'0');
    const mm = String(d.getMonth()+1).padStart(2,'0');
    return days[d.getDay()] + ' ' + dd + '/' + mm;
  }
  // Giorno di chiusura settimanale?
  function isGiornoChiuso(d){ return P.giorniChiusura.indexOf(d.getDay()) !== -1; }
  // Data prenotabile? (non passata, non chiusa, entro la finestra)
  function isDataValida(d){
    const oggi = startOfDay(new Date());
    const limite = addDays(oggi, P.giorniPrenotabili);
    return d >= oggi && d <= limite && !isGiornoChiuso(d);
  }

  /* ═══════════════════════════════════════════════════════════════════════
     🔑 LOGICA DISPONIBILITÀ — cuore del template (isolata e documentata)
     ═══════════════════════════════════════════════════════════════════════
     Sorgente dati coperti occupati, in ordine di priorità:
       1. CONFIG.prenotazioni.occupatiDemo  → dati finti per la demo
       2. localStorage                       → prenotazioni fatte dall'utente
       3. [PRODUZIONE] Google Sheets / DB    → vedi caricaOccupatiDaSheets()

     👉 QUANDO PASSERAI A SUPABASE/DB REALE:
        sostituisci il contenuto di getPostiOccupati() con una query del tipo
        SELECT COALESCE(SUM(coperti),0) FROM bookings WHERE data=? AND ora=?;
        e mantieni identica la firma della funzione: tutto il resto continua
        a funzionare senza modifiche.
     ═══════════════════════════════════════════════════════════════════════ */

  // Legge le prenotazioni salvate localmente (array di oggetti prenotazione).
  function getPrenotazioniLocali(){
    try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
    catch(e){ return []; }
  }

  // Ricostruisce occupatiCache unendo demo + localStorage (+ eventuale remoto già caricato).
  function ricostruisciCache(remoto){
    const cache = {};
    // 1) Dati demo da CONFIG
    Object.keys(P.occupatiDemo || {}).forEach(function(k){
      const realKey = ancoraChiaveDemo(k);
      cache[realKey] = Object.assign({}, cache[realKey], P.occupatiDemo[k]);
    });
    // 2) Prenotazioni salvate in localStorage
    getPrenotazioniLocali().forEach(function(b){
      if(!cache[b.data]) cache[b.data] = {};
      cache[b.data][b.ora] = (cache[b.data][b.ora] || 0) + Number(b.persone || 0);
    });
    // 3) Dati remoti già scaricati (Sheets) — sommati sopra i precedenti
    if(remoto){
      Object.keys(remoto).forEach(function(data){
        Object.keys(remoto[data]).forEach(function(ora){
          if(!cache[data]) cache[data] = {};
          cache[data][ora] = Math.max(cache[data][ora] || 0, Number(remoto[data][ora] || 0));
        });
      });
    }
    occupatiCache = cache;
  }

  // Converte una chiave demo tipo "GIORNO+1" in una data reale (oggi + N giorni).
  function ancoraChiaveDemo(k){
    if(P.ancoraDemo && /^GIORNO\+\d+$/.test(k)){
      const n = parseInt(k.split('+')[1], 10);
      return keyData(addDays(startOfDay(new Date()), n));
    }
    return k;
  }

  /**
   * Coperti GIÀ OCCUPATI in una certa data + fascia oraria.
   * @param {string} dataKey  "YYYY-MM-DD"
   * @param {string} ora      "HH:MM"
   * @returns {number} coperti già prenotati (0 se nessuno).
   * ⬅️ IN PRODUZIONE: qui va la query allo Sheet/DB (vedi blocco sopra).
   */
  function getPostiOccupati(dataKey, ora){
    return (occupatiCache[dataKey] && occupatiCache[dataKey][ora]) || 0;
  }

  /**
   * Coperti ANCORA LIBERI in una data + fascia oraria.
   * @returns {number} capienzaCoperti - occupati (min 0).
   */
  function getDisponibilita(dataKey, ora){
    return Math.max(0, P.capienzaCoperti - getPostiOccupati(dataKey, ora));
  }

  /**
   * La fascia può accogliere una prenotazione di `persone` coperti?
   * Tiene conto sia della capienza sia delle persone della prenotazione in corso.
   * @returns {boolean}
   */
  function isFasciaDisponibile(dataKey, ora, persone){
    return getDisponibilita(dataKey, ora) >= persone;
  }

  /**
   * Salva una nuova prenotazione: (1) in localStorage per coerenza demo,
   * (2) sullo Google Sheet del cliente (se configurato).
   * @returns {Promise} risolta a invio completato (o subito, in solo-locale).
   */
  function salvaPrenotazione(prenotazione){
    // (1) Persistenza locale → aggiorna subito i conteggi/il grigetto
    const arr = getPrenotazioniLocali();
    arr.push(prenotazione);
    try { localStorage.setItem(LS_KEY, JSON.stringify(arr)); } catch(e){}
    ricostruisciCache();
    // (2) Invio allo Sheet del ristorante (una Web App diversa per ogni cliente)
    return inviaASheets(prenotazione);
  }

  /* ─────────────────────────────────────────────────────────────────────
     GOOGLE SHEETS — invio prenotazione (POST) e lettura occupati (GET)
     Ogni landing punta a uno Sheet diverso via CONFIG.integrazione.googleSheetsWebAppUrl.
     Setup della Web App: vedi README.
     ───────────────────────────────────────────────────────────────────── */
  function inviaASheets(prenotazione){
    const url = C.integrazione.googleSheetsWebAppUrl;
    if(!url) return Promise.resolve({ ok:true, locale:true });  // solo-locale (demo)
    // mode:'no-cors' + text/plain evita il preflight CORS con Apps Script.
    // Non possiamo leggere la risposta, ma la riga viene scritta sullo Sheet.
    return fetch(url, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(prenotazione),
    }).then(function(){ return { ok:true }; })
      .catch(function(err){ console.warn('Invio Sheets fallito:', err); return { ok:false }; });
  }

  // [OPZIONALE] Legge i coperti occupati reali dallo Sheet all'avvio.
  // Richiede una Web App che risponda ai GET con JSON: { "YYYY-MM-DD": { "HH:MM": n } }
  function caricaOccupatiDaSheets(){
    const url = C.integrazione.googleSheetsWebAppUrl;
    if(!url || !C.integrazione.leggiOccupatiDaSheets) return Promise.resolve(null);
    return fetch(url + '?action=occupati')
      .then(function(r){ return r.json(); })
      .catch(function(){ return null; });  // fallback silenzioso su demo+localStorage
  }

  /* ═══════════════════════════════════════════════════════════════════════
     RENDERING UI
     ═══════════════════════════════════════════════════════════════════════ */
  const wizard = document.getElementById('bookingWizard');
  const els = {};
  ['btnBack','stepTabs','summaryBar','summaryDate','summaryPeople','summaryTime','summaryTimeItem',
   'tabDate','tabPeople','tabTime','tabDateLabel','tabDateValue','tabPeopleLabel','tabPeopleValue',
   'tabTimeLabel','tabTimeValue','calMonthLabel','calGrid','calPrev','calNext','peopleGrid',
   'peopleCustom','peopleSubmit','timeGrid','inputNome','inputTelefono','inputRichieste',
   'btnConferma','btnNewBooking','successDetails','bookingProgressFill','errTelefono']
    .forEach(function(id){ els[id] = document.getElementById(id); });

  // Applica CONFIG.colori alle variabili CSS
  function applicaColori(){
    const r = document.documentElement.style;
    const c = C.colori;
    r.setProperty('--gold', c.oro);
    r.setProperty('--gold-light', c.oroChiaro);
    r.setProperty('--gold-pale', c.oroPale);
    r.setProperty('--ink', c.nero);
    r.setProperty('--ink-light', c.inkLight);
    r.setProperty('--cream', c.crema);
    r.setProperty('--warm-white', c.bianco);
    r.setProperty('--cta-bg', c.ctaBg);
    r.setProperty('--cta-text', c.ctaText);
  }

  // Popola hero, testi form, footer da CONFIG
  function popolaContenuti(){
    // Logo
    const logoWrap = document.getElementById('logoWrap');
    if(C.brand.logo){
      logoWrap.innerHTML = '<img src="'+C.brand.logo+'" alt="Logo '+esc(C.brand.nome)+'">';
    } else {
      logoWrap.innerHTML = '<span class="logo-initials">'+esc(C.brand.iniziali)+'</span>';
    }
    document.getElementById('brandEyebrow').textContent = C.brand.tagline;
    document.getElementById('heroHeadline').innerHTML = C.hero.headline;      // <em> ammesso
    document.getElementById('heroSubtitle').textContent = C.hero.sottotitolo;
    document.getElementById('heroCtaText').textContent = C.hero.ctaTesto;
    document.getElementById('wizardBrand').textContent = C.brand.nome;
    document.getElementById('bookingTitle').textContent = C.testi.formTitolo;
    document.title = C.testi.formTitolo + ' · ' + C.brand.nome;

    // Etichette step / form
    els.tabDateLabel.textContent = C.testi.stepData;
    els.tabPeopleLabel.textContent = C.testi.stepPersone;
    els.tabTimeLabel.textContent = C.testi.stepOrario;
    document.getElementById('labelNome').textContent = C.testi.labelNome;
    document.getElementById('labelTelefono').textContent = C.testi.labelTelefono;
    document.getElementById('labelRichieste').innerHTML = C.testi.labelRichieste +
      ' <span style="font-weight:400;color:var(--gray-400);font-style:italic">(facoltativo)</span>';
    els.btnConferma.textContent = C.testi.btnConferma;
    document.getElementById('successTitolo').textContent = C.testi.successTitolo;
    document.getElementById('successMsg').textContent = C.testi.successMsg;
    els.peopleCustom.max = P.maxPersonePrenotazione;

    // Footer
    document.getElementById('footerName').textContent = C.brand.nome;
    const ct = C.contatti;
    document.getElementById('footerContact').innerHTML =
      '<a href="'+ct.linkMappe+'" target="_blank" rel="noopener">📍 '+esc(ct.indirizzo)+'</a>' +
      '<a href="tel:'+ct.telefono.replace(/\s/g,'')+'">📞 '+esc(ct.telefono)+'</a>' +
      (ct.email ? '<a href="mailto:'+ct.email+'">✉️ '+esc(ct.email)+'</a>' : '');
    document.getElementById('footerHours').innerHTML = (ct.orari||[]).map(function(o){
      return '<div class="footer-hours-row"><span>'+esc(o.giorno)+'</span><span>'+esc(o.orario)+'</span></div>';
    }).join('');
    const soc = ct.social || {};
    let socHtml = '';
    if(soc.instagram) socHtml += '<a href="'+soc.instagram+'" target="_blank" rel="noopener" aria-label="Instagram"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><line x1="17.5" y1="6.5" x2="17.5" y2="6.5"/></svg></a>';
    if(soc.facebook)  socHtml += '<a href="'+soc.facebook+'" target="_blank" rel="noopener" aria-label="Facebook"><svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg></a>';
    document.getElementById('footerSocial').innerHTML = socHtml;
  }

  function esc(s){ return String(s).replace(/[&<>"]/g, function(m){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]; }); }

  /* ── Calendario ── */
  function renderCalendar(){
    const oggi = startOfDay(new Date());
    els.calMonthLabel.textContent = MONTHS_IT[state.calMonth] + ' ' + state.calYear;

    // Disabilita navigazione oltre i limiti prenotabili
    const primoGiornoMese = new Date(state.calYear, state.calMonth, 1);
    const ultimoGiornoMese = new Date(state.calYear, state.calMonth + 1, 0);
    const limite = addDays(oggi, P.giorniPrenotabili);
    els.calPrev.disabled = (primoGiornoMese <= oggi);
    els.calNext.disabled = (ultimoGiornoMese >= limite);

    const startOffset = primoGiornoMese.getDay();
    const daysInMonth = ultimoGiornoMese.getDate();
    els.calGrid.innerHTML = '';

    for(let i = 0; i < startOffset; i++){
      const empty = document.createElement('button');
      empty.className = 'cal-day empty'; empty.disabled = true; empty.tabIndex = -1;
      els.calGrid.appendChild(empty);
    }
    for(let day = 1; day <= daysInMonth; day++){
      const date = new Date(state.calYear, state.calMonth, day);
      const btn = document.createElement('button');
      btn.className = 'cal-day'; btn.textContent = day; btn.type = 'button';

      const passata = date < oggi;
      const oltreLimite = date > limite;
      const chiusa = isGiornoChiuso(date);

      if(passata || oltreLimite){
        btn.classList.add('disabled'); btn.disabled = true;
      } else if(chiusa){
        btn.classList.add('closed'); btn.disabled = true;
        btn.setAttribute('aria-label', day + ' — giorno di chiusura');
      } else {
        if(isSameDay(date, oggi)) btn.classList.add('today');
        if(state.date && isSameDay(date, state.date)) btn.classList.add('selected');
        btn.setAttribute('aria-label', 'Seleziona ' + formatData(date));
        btn.addEventListener('click', function(){
          state.date = date;
          renderCalendar();
          renderTimeGrid();      // disponibilità dipende dalla data
          updateTabs();
          setTimeout(function(){ goToStep(2); }, 180);
        });
      }
      els.calGrid.appendChild(btn);
    }
  }

  /* ── Persone ── */
  function renderPeopleGrid(){
    els.peopleGrid.innerHTML = '';
    for(let i = 1; i <= 10; i++){
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'people-btn' + (state.people === i ? ' selected' : '');
      btn.textContent = i;
      btn.setAttribute('aria-label', i + (i===1?' persona':' persone'));
      btn.addEventListener('click', function(){ selezionaPersone(i); });
      els.peopleGrid.appendChild(btn);
    }
  }
  function selezionaPersone(n){
    state.people = n;
    els.peopleCustom.value = '';
    renderPeopleGrid();
    renderTimeGrid();   // 🔁 ricalcola disponibilità in base alle persone
    updateTabs();
    // Se l'orario scelto prima non regge più le nuove persone, azzeralo
    if(state.time && state.date && !isFasciaDisponibile(keyData(state.date), state.time, state.people)){
      state.time = null;
    }
    setTimeout(function(){ goToStep(3); }, 180);
  }

  /* ── Orario (con logica capienza) ── */
  function renderTimeGrid(){
    els.timeGrid.innerHTML = '';
    const dataKey = state.date ? keyData(state.date) : null;
    const persone = state.people || 1;

    P.fasceOrarie.forEach(function(slot){
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.setAttribute('role', 'option');

      const disponibili = dataKey ? getDisponibilita(dataKey, slot) : P.capienzaCoperti;
      const ok = disponibili >= persone;

      let statoHtml = '';
      if(disponibili <= 0){
        // Fascia completamente piena
        statoHtml = '<span class="time-status full">Completo</span>';
      } else if(!ok){
        // Ci sono posti ma non abbastanza per questa prenotazione
        statoHtml = '<span class="time-status full">Solo '+disponibili+' '+(disponibili===1?'posto':'posti')+'</span>';
      } else if(disponibili <= P.sogliaUltimiPosti){
        // Disponibile ma quasi pieno
        statoHtml = '<span class="time-status last">Ultimi posti</span>';
      } else {
        statoHtml = '<span class="time-status" style="color:var(--gray-400)">Disponibile</span>';
      }

      btn.innerHTML = '<span>'+slot+'</span>' + statoHtml;
      btn.className = 'time-btn' + (state.time === slot ? ' selected' : '');

      if(!ok){
        // 🔒 NON selezionabile → grigio, disabilitato
        btn.classList.add('full');
        btn.disabled = true;
        btn.setAttribute('aria-disabled', 'true');
        btn.setAttribute('aria-label', slot + ' non disponibile');
      } else {
        btn.setAttribute('aria-label', 'Seleziona ' + slot);
        btn.addEventListener('click', function(){
          state.time = slot;
          renderTimeGrid();
          updateTabs();
          updateSummaries();
          setTimeout(function(){ goToStep(4); }, 180);
        });
      }
      els.timeGrid.appendChild(btn);
    });
  }

  /* ── Summary + tabs + navigazione (logica UI del wizard) ── */
  function updateSummaries(){
    els.summaryDate.textContent = state.date ? formatData(state.date) : '—';
    els.summaryPeople.textContent = state.people ? state.people + ' pers.' : '—';
    if(state.time){
      els.summaryTime.textContent = state.time;
      els.summaryTimeItem.classList.remove('pending');
    } else {
      els.summaryTime.textContent = 'Ora';
      els.summaryTimeItem.classList.add('pending');
    }
  }
  function updateToolbar(n){
    const showTabs = n <= 2;
    const showSummary = n === 3 || n === 4;
    if(els.stepTabs) els.stepTabs.style.display = showTabs ? 'flex' : 'none';
    els.summaryBar.classList.toggle('visible', showSummary);
    wizard.classList.toggle('success-mode', n === 5);
    if(els.bookingProgressFill){
      els.bookingProgressFill.style.width = Math.round(((n-1)/4)*100) + '%';
    }
    if(showSummary) updateSummaries();
  }
  function updateTabs(){
    const tabs = [els.tabDate, els.tabPeople, els.tabTime];
    tabs.forEach(function(tab, idx){
      const stepNum = idx + 1;
      tab.classList.remove('active','done');
      if(state.step === stepNum) tab.classList.add('active');
      else if((stepNum===1&&state.date)||(stepNum===2&&state.people)||(stepNum===3&&state.time)){
        tab.classList.add('done');
      }
    });
    setTabValue(els.tabDateLabel, els.tabDateValue, state.date ? formatData(state.date) : null);
    setTabValue(els.tabPeopleLabel, els.tabPeopleValue, state.people ? state.people + ' pers.' : null);
    setTabValue(els.tabTimeLabel, els.tabTimeValue, state.time);
  }
  function setTabValue(labelEl, valueEl, value){
    if(value){ labelEl.style.display='none'; valueEl.style.display='block'; valueEl.textContent=value; }
    else { labelEl.style.display='block'; valueEl.style.display='none'; }
  }
  function goToStep(n){
    state.step = n;
    document.querySelectorAll('.step-panel').forEach(function(p){ p.classList.remove('active'); });
    document.getElementById('step' + n).classList.add('active');
    updateToolbar(n);
    els.btnBack.classList.toggle('hidden', n === 1 || n === 5);
    wizard.classList.toggle('summary-mode', n === 4);
    updateTabs();
    validateForm();
  }

  /* ── Validazione form contatti ── */
  function validaTelefono(tel){
    // Almeno 7 cifre; ammette +, spazi, trattini, parentesi
    const cifre = tel.replace(/[^\d]/g,'');
    return cifre.length >= 7;
  }
  function validateForm(){
    const nome = els.inputNome.value.trim();
    const tel = els.inputTelefono.value.trim();
    const bookingComplete = !!(state.date && state.people && state.time);
    const telOk = validaTelefono(tel);
    const formComplete = !!(nome && tel && telOk);
    // messaggio errore telefono (solo se ha iniziato a scrivere)
    els.errTelefono.textContent = (tel && !telOk) ? 'Inserisci un numero di telefono valido' : '';
    const isReady = state.step === 4 && bookingComplete && formComplete && !state.sending;
    els.btnConferma.classList.toggle('ready', isReady);
    els.btnConferma.disabled = !isReady;
  }

  /* ── Conferma prenotazione ── */
  function confirmBooking(){
    if(els.btnConferma.disabled || state.sending) return;

    const dataKey = keyData(state.date);
    // Doppio controllo capienza al momento dell'invio (anti-race lato demo)
    if(!isFasciaDisponibile(dataKey, state.time, state.people)){
      alert('Spiacenti, questa fascia oraria si è appena riempita. Scegli un altro orario.');
      goToStep(3); renderTimeGrid(); return;
    }

    const prenotazione = {
      ristorante: C.brand.nome,
      data:       dataKey,                 // "YYYY-MM-DD"
      dataLabel:  formatData(state.date),
      ora:        state.time,
      persone:    state.people,
      nome:       els.inputNome.value.trim(),
      telefono:   els.inputTelefono.value.trim(),
      richieste:  els.inputRichieste.value.trim(),
      creata:     new Date().toISOString(),
    };

    state.sending = true;
    els.btnConferma.classList.add('sending');
    els.btnConferma.textContent = 'Invio in corso…';

    salvaPrenotazione(prenotazione).then(function(){
      state.sending = false;
      mostraSuccesso(prenotazione);
    });
  }
  function mostraSuccesso(b){
    els.successDetails.innerHTML =
      '<p><strong>📅 Data:</strong> ' + esc(b.dataLabel) + '</p>' +
      '<p><strong>👥 Persone:</strong> ' + esc(String(b.persone)) + '</p>' +
      '<p><strong>🕐 Orario:</strong> ' + esc(b.ora) + '</p>' +
      '<p><strong>👤 Nome:</strong> ' + esc(b.nome) + '</p>' +
      '<p><strong>📞 Telefono:</strong> ' + esc(b.telefono) + '</p>' +
      (b.richieste ? '<p><strong>📝 Richieste:</strong> ' + esc(b.richieste) + '</p>' : '');
    goToStep(5);
  }

  /* ── Reset ── */
  function resetBooking(){
    state.step=1; state.date=null; state.people=null; state.time=null; state.sending=false;
    state.calYear=new Date().getFullYear(); state.calMonth=new Date().getMonth();
    els.inputNome.value=''; els.inputTelefono.value='';
    els.inputRichieste.value=''; els.peopleCustom.value='';
    els.btnConferma.classList.remove('ready','sending');
    els.btnConferma.textContent = C.testi.btnConferma;
    renderCalendar(); renderPeopleGrid(); renderTimeGrid();
    goToStep(1);
    document.getElementById('prenota').scrollIntoView({behavior:'smooth', block:'start'});
  }

  /* ═══════════════════════════════════════════════════════════════════════
     EVENT LISTENERS
     ═══════════════════════════════════════════════════════════════════════ */
  document.getElementById('heroCta').addEventListener('click', function(){
    document.getElementById('prenota').scrollIntoView({behavior:'smooth', block:'start'});
  });
  els.calPrev.addEventListener('click', function(){
    if(els.calPrev.disabled) return;
    state.calMonth--; if(state.calMonth<0){state.calMonth=11;state.calYear--;}
    renderCalendar();
  });
  els.calNext.addEventListener('click', function(){
    if(els.calNext.disabled) return;
    state.calMonth++; if(state.calMonth>11){state.calMonth=0;state.calYear++;}
    renderCalendar();
  });
  els.peopleSubmit.addEventListener('click', function(){
    const val = parseInt(els.peopleCustom.value, 10);
    if(val >= 1 && val <= P.maxPersonePrenotazione){
      selezionaPersone(val);
    } else {
      els.peopleCustom.focus();
    }
  });
  els.peopleCustom.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){ e.preventDefault(); els.peopleSubmit.click(); }
  });
  els.btnBack.addEventListener('click', function(){ if(state.step>1) goToStep(state.step-1); });
  els.tabDate.addEventListener('click', function(){ if(state.date && state.step!==1) goToStep(1); });
  els.tabPeople.addEventListener('click', function(){ if(state.people && state.step!==2) goToStep(2); });
  els.tabTime.addEventListener('click', function(){ if(state.time && state.step!==3) goToStep(3); });
  // Tab navigabili da tastiera
  [els.tabDate, els.tabPeople, els.tabTime].forEach(function(t){
    t.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); t.click(); } });
  });
  els.inputNome.addEventListener('input', validateForm);
  els.inputTelefono.addEventListener('input', validateForm);
  els.btnConferma.addEventListener('click', confirmBooking);
  els.btnNewBooking.addEventListener('click', resetBooking);

  /* ═══════════════════════════════════════════════════════════════════════
     AVVIO
     ═══════════════════════════════════════════════════════════════════════ */
  function init(){
    applicaColori();
    popolaContenuti();
    ricostruisciCache();                 // demo + localStorage
    renderCalendar();
    renderPeopleGrid();
    renderTimeGrid();
    goToStep(1);
    // [Opzionale] carica occupati reali dallo Sheet e ridisegna gli orari
    caricaOccupatiDaSheets().then(function(remoto){
      if(remoto){ ricostruisciCache(remoto); renderTimeGrid(); }
    });
  }
  init();
})();
</script>
